<style>
    /* 1. Overlay - Арын бүдгэрүүлэгч */
    .kb-overlay {
        display: none; 
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 100000;
        justify-content: center;
        align-items: center;
        font-family: 'Noto Sans KR', sans-serif;
    }

    /* 2. Modal Container */
    .kb-modal {
        background: #fff;
        width: 90%;
        max-width: 750px;
        min-height: 450px;
        border-radius: 15px;
        display: flex;
        overflow: hidden;
        position: relative;
        box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    /* Хаах товчлуур */
    .kb-close {
        position: absolute;
        top: 15px; right: 20px;
        font-size: 30px;
        color: #331d0d;
        cursor: pointer;
        z-index: 10;
        line-height: 1;
        font-weight: bold;
    }

    /* Зүүн тал: Зургийн хэсэг */
    .kb-image-side {
        width: 48%;
        background: url('Gemini_Generated_Image_ (1).png') center/cover no-repeat;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    /* Зураг дээрх логоны контейнер */
    .kb-logo-overlay {
        width: 80px;
        height: 80px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* Баруун тал: Контент */
    .kb-content-side {
        width: 52%;
        background: #f4eade; /* Таны хүссэн зөөлөн шаргал өнгө */
        padding: 50px 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
        box-sizing: border-box;
    }

    /* Гарчиг болон Текст */
    .kb-title {
        font-family: 'Playfair Display', serif;
        font-size: 30px;
        font-weight: 700;
        color: #331d0d;
        margin-bottom: 20px;
        line-height: 1.2;
    }

    /* Оруулах талбар */
    .kb-input {
        width: 100%;
        padding: 15px;
        margin-bottom: 15px;
        border: 1.5px solid #b37341;
        border-radius: 8px;
        background: #fff;
        font-size: 16px;
        text-align: center;
        box-sizing: border-box;
        outline: none;
    }

    /* Үндсэн товчлуур */
    .kb-button {
        width: 100%;
        padding: 15px;
        background: #b37341;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .kb-button:hover {
        background: #9a6337;
    }

    /* Хөнгөлөлтийн кодны хайрцаг (Step 2) */
    .kb-promo-box {
        font-size: 24px;
        font-weight: bold;
        color: #b37341;
        border: 2px dashed #b37341;
        padding: 15px;
        margin: 20px 0;
        background: #fff;
        letter-spacing: 3px;
    }

    .kb-subtext {
        font-size: 11px;
        color: #888;
        margin-top: 15px;
        line-height: 1.4;
    }

    /* Мобайл төхөөрөмж (Responsive) */
    @media (max-width: 768px) {
        .kb-modal { flex-direction: column; max-width: 350px; min-height: auto; }
        .kb-image-side { width: 100%; height: 180px; }
        .kb-content-side { width: 100%; padding: 30px 20px; }
        .kb-title { font-size: 24px; }
    }
</style>

<div class="kb-overlay" id="kbOverlay">
    <div class="kb-modal">
        <span class="kb-close" onclick="kbClose()">&times;</span>
        
        <div class="kb-image-side">
            <div class="kb-logo-overlay">
                <span style="font-weight: bold; color: #c2c395; font-size: 12px; text-align: center;">K-Beauty</span>
            </div>
        </div>
        
        <div class="kb-content-side">
            
            <div id="kbStep1">
                <div class="kb-title">Unlock Your Exclusive Glow</div>
                <p style="margin-bottom: 20px; color: #555;">Enter your email to receive a special 5% discount code!</p>
                <input type="email" id="kbEmailField" class="kb-input" placeholder="Your Email Address">
                <button class="kb-button" onclick="kbGoNext()">Get My Code</button>
                <div class="kb-subtext">
                    By joining, you agree to our beauty updates.
                </div>
            </div>

            <div id="kbStep2" style="display: none;">
                <div class="kb-title">You're Ready! ✨</div>
                <p style="color: #331d0d; font-size: 16px;">Use this code at checkout for your first order:</p>
                <div class="kb-promo-box">GLOW5OFF</div>
                <button class="kb-button" onclick="kbClose()">Start Shopping</button>
                <p style="font-size: 12px; margin-top: 15px; color: #b37341; font-weight: bold;">Valid for 24 hours only!</p>
            </div>

        </div>
    </div>
</div>

<script>
    // 1. Хуудас ачаалагдсанаас 3 секундын дараа харуулна
    window.addEventListener('load', function() {
        setTimeout(function() {
            document.getElementById('kbOverlay').style.display = 'flex';
        }, 3000);
    });

    // 2. Дараагийн алхам руу шилжих
    function kbGoNext() {
        const email = document.getElementById('kbEmailField').value;
        
        if (email.trim() === "" || !email.includes('@')) {
            alert("Please enter a valid email address.");
            return;
        }

        document.getElementById('kbStep1').style.display = 'none';
        document.getElementById('kbStep2').style.display = 'block';
    }

    // 3. Поп-ап хаах
    function kbClose() {
        document.getElementById('kbOverlay').style.display = 'none';
    }
</script>
